; ===========================================================================
;  PlatformIO — ESP32-S3 Super Mini  ·  DLP Projector Spoofer
;
;  Spoofs the light source control PCB (SK01, 13-pin) and I2C temperature
;  sensor 0x4D (SK05, 20-pin) of a DLP projector, enabling the original
;  light engine to be replaced with a 405 nm UV laser for photolithography.
;
;  Uses the OFFICIAL espressif32 platform (Arduino-ESP32 2.x / ESP-IDF 4.4).
;  No PyYAML or external Python dependencies required — works with Python 3.8+.
;
;  Build & upload (VS Code PlatformIO extension recommended on Windows):
;    PlatformIO sidebar → esp32s3 → Build / Upload
;
;  Monitor:
;    python -m platformio device monitor
; ===========================================================================

[platformio]
default_envs = esp32s3

; ---------------------------------------------------------------------------
; Global defaults
; ---------------------------------------------------------------------------
[env]
framework     = arduino
monitor_speed = 115200

; ===========================================================================
; ESP32-S3 Super Mini
;   Safe user GPIOs: 1-18, 21, 38-48  (19-20 = USB D±, 26-32 = flash/PSRAM)
;   Upload via UART or USB-JTAG with upload_protocol = esp-builtin
;
;   flash_mode = dio  →  universal/safe for all Super Mini flash chips.
;   The devkitc-1 default (qd) causes "do_core_init flash_ret == ESP_OK" crash
;   on Super Mini boards whose flash chip only supports DIO or QIO, not QD.
;   If DIO works but you want max speed, try qio instead.
;
;   CORE_DEBUG_LEVEL=3: verbose logging during bringup.
;   Change to 0 for production to eliminate serial overhead.
; ===========================================================================
[env:esp32s3]
platform    = espressif32 @ 6.9.0
board       = esp32-s3-devkitc-1
board_build.flash_mode  = dio
board_build.flash_freq  = 80m
board_build.flash_size  = 4MB
board_upload.flash_size = 4MB
board_build.partitions  = default.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
