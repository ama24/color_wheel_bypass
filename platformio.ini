; ===========================================================================
;  PlatformIO — ESP32-C3 / S3 Super Mini  ·  Stable Pulse Generator
;
;  Signal on PULSE_GPIO (default GPIO 5):
;    HIGH : 7 600 µs
;    LOW  :   731 µs
;    Period: 8 331 µs  ≈  120.03 Hz  (100 % hardware-driven via RMT)
;
;  Requires the pioarduino platform fork (ESP-IDF 5.x / Arduino-ESP32 3.x)
;  for the new RMT TX API with infinite-loop support.
;
;  Build targets:
;    pio run -e esp32c3           (or set default_envs below)
;    pio run -e esp32s3
;    pio run -e esp32c3 -t upload
;    pio run -e esp32s3 -t upload
; ===========================================================================

[platformio]
default_envs = esp32c3      ; change to esp32s3 to target the S3 Super Mini

; ---------------------------------------------------------------------------
; Global defaults shared by every environment
; ---------------------------------------------------------------------------
[env]
framework     = arduino
monitor_speed = 115200
build_flags   =
    -DCORE_DEBUG_LEVEL=1    ; 0=none 1=error 2=warn 3=info 4=debug 5=verbose

; ---------------------------------------------------------------------------
; Shared platform — pioarduino fork brings ESP-IDF 5.x to PlatformIO.
; Check https://github.com/pioarduino/platform-espressif32/releases for the
; latest tag and update the URL if a newer version is available.
; ---------------------------------------------------------------------------
[common]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip

; ===========================================================================
; ESP32-C3 Super Mini
;   • GPIO 0-10 are user-safe (11-17 = flash, 18-19 = USB D±)
;   • ARDUINO_USB_CDC_ON_BOOT routes Serial to the native USB-C port
; ===========================================================================
[env:esp32c3]
platform    = ${common.platform}
board       = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DPULSE_GPIO=5          ; change to any free GPIO 0-10 (avoid 18/19)

; ===========================================================================
; ESP32-S3 Super Mini
;   • Rich GPIO set: 1-21, 38-48 (avoid 19-20 USB D±, 26-32 flash)
;   • ARDUINO_USB_MODE=1 keeps CDC/JTAG on the built-in USB connector
; ===========================================================================
[env:esp32s3]
platform    = ${common.platform}
board       = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DPULSE_GPIO=5          ; change to any free GPIO on the S3 Super Mini
