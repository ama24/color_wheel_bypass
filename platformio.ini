; ===========================================================================
;  PlatformIO — ESP32-C3 / S3 Super Mini  ·  Stable Pulse Generator
;
;  Signal on PULSE_GPIO (default GPIO 5):
;    HIGH : 7 600 µs
;    LOW  :   731 µs
;    Period: 8 331 µs  ≈  120.03 Hz  (100 % hardware-driven via RMT)
;
;  Uses the OFFICIAL espressif32 platform (Arduino-ESP32 2.x / ESP-IDF 4.4).
;  No PyYAML or external Python dependencies required — works with Python 3.8+.
;
;  Build & upload:
;    python -m platformio run -e esp32c3 -t upload
;    python -m platformio run -e esp32s3 -t upload
;
;  Monitor:
;    python -m platformio device monitor
; ===========================================================================

[platformio]
default_envs = esp32c3

; ---------------------------------------------------------------------------
; Global defaults
; ---------------------------------------------------------------------------
[env]
framework     = arduino
monitor_speed = 115200
build_flags   = -DCORE_DEBUG_LEVEL=0   ; no serial needed — pulse is pure HW

; ===========================================================================
; ESP32-C3 Super Mini
;   Safe user GPIOs: 0-10  (11-17 = flash, 18-19 = USB D±)
;   Upload via UART (auto-detected) or USB-JTAG with upload_protocol = esp-builtin
; ===========================================================================
[env:esp32c3]
platform    = espressif32 @ 6.9.0
board       = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DPULSE_GPIO=5          ; change to any free GPIO 0-10 (avoid 18/19)

; ===========================================================================
; ESP32-S3 Super Mini
;   Safe user GPIOs: 1-18, 21, 38-48  (19-20 = USB D±, 26-32 = flash/PSRAM)
;   Upload via UART or USB-JTAG with upload_protocol = esp-builtin
;
;   flash_mode = dio  →  universal/safe for all Super Mini flash chips.
;   The devkitc-1 default (qd) causes "do_core_init flash_ret == ESP_OK" crash
;   on Super Mini boards whose flash chip only supports DIO or QIO, not QD.
;   If DIO works but you want max speed, try qio instead.
; ===========================================================================
[env:esp32s3]
platform    = espressif32 @ 6.9.0
board       = esp32-s3-devkitc-1
board_build.flash_mode  = dio
board_build.flash_freq  = 80m
board_build.flash_size  = 4MB
board_upload.flash_size = 4MB
board_build.partitions  = default.csv
build_flags =
    ${env.build_flags}
    -DPULSE_GPIO=5          ; change to any free GPIO on the S3 Super Mini
